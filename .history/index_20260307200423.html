<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shave My Back</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        cursor: none;
      }

      /* ── TITLE SCREEN ── */
      #title-screen {
        position: fixed;
        inset: 0;
        z-index: 9000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        background: url("assets/Skin.png") center/cover;
        transition: opacity 0.6s ease;
      }
      #title-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #title-screen img.logo {
        width: min(680px, 85vw);
        filter: drop-shadow(0 6px 24px rgba(0, 0, 0, 0.55));
        animation: logoFloat 3s ease-in-out infinite;
      }
      @keyframes logoFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      #start-btn {
        cursor: pointer;
        border: none;
        background: none;
        padding: 0;
        width: min(280px, 60vw);
        transition: transform 0.15s ease, filter 0.15s ease;
      }
      #start-btn:hover {
        transform: scale(1.07);
        filter: brightness(1.1) drop-shadow(0 4px 16px rgba(0, 200, 80, 0.5));
      }
      #start-btn:active {
        transform: scale(0.97);
      }

      /* ── SKIN SELECTOR (bottom center, title screen) ── */
      .skin-selector {
        display: flex;
        gap: 10px;
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9100;
      }
      .skin-btn {
        width: 80px;
        height: 54px;
        cursor: pointer;
        border: none;
        background: none;
        padding: 0;
        transition: transform 0.15s, filter 0.15s;
      }
      .skin-btn:hover {
        transform: scale(1.08);
      }
      .skin-btn:active {
        transform: scale(0.95);
      }

      /* ── GAME CONTAINER ── */
      #game-container {
        width: 100vw;
        height: 100vh;
        position: relative;
        background: url("assets/Skin.png") center/cover;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
      }

      /* ── RAZOR CURSOR ── */
      #razor {
        position: fixed;
        pointer-events: none;
        width: 100px;
        z-index: 1000;
        transform: translate(-28%, -20%);
        transition: opacity 0.2s;
      }

      /* ── WOUNDS ── */
      .wound {
        position: absolute;
        pointer-events: none;
        width: 100px;
        z-index: 5;
      }

      /* ── OUCH FLASH ── */
      #ouch-overlay {
        position: fixed;
        inset: 0;
        z-index: 800;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
      }
      #ouch-overlay.flash {
        animation: ouchFlash 0.9s ease forwards;
      }
      @keyframes ouchFlash {
        0% {
          opacity: 0;
        }
        15% {
          opacity: 1;
        }
        70% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
      #ouch-overlay .ouch-bg {
        position: absolute;
        inset: 0;
        background: rgba(160, 0, 0, 0.38);
        border: 12px solid rgba(180, 0, 0, 0.55);
        border-radius: 40px;
      }
      #ouch-overlay .ouch-text {
        position: relative;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(48px, 8vw, 96px);
        font-weight: 900;
        color: #fff;
        text-shadow: 0 4px 24px rgba(0, 0, 0, 0.6),
          0 0 40px rgba(255, 60, 60, 0.4);
        letter-spacing: 2px;
        z-index: 1;
      }

      /* ── UI BUTTONS ── */
      .ui-container {
        position: fixed;
        bottom: 20px;
        z-index: 2000;
        display: flex;
        gap: 10px;
      }
      #left-ctrl {
        left: 20px;
      }
      #right-ctrl {
        right: 20px;
      }

      .btn {
        width: 70px;
        cursor: pointer;
        display: none;
        transition: transform 0.15s, filter 0.15s;
        filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
      }
      .btn:hover {
        transform: scale(1.1);
        filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5)) brightness(1.1);
      }
      .btn:active {
        transform: scale(0.95);
      }
      .btn.visible {
        display: block;
      }

      /* ── IN-GAME SKIN SELECTOR ── */
      #game-skin-selector {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2000;
        display: none;
        gap: 10px;
      }
      #game-skin-selector.visible {
        display: flex;
      }
      #game-skin-selector .skin-btn {
        width: 72px;
        height: 48px;
      }
    </style>
  </head>
  <body>
    <!-- RAZOR CURSOR -->
    <img id="razor" src="assets/Razor.png" alt="" />

    <!-- OUCH OVERLAY -->
    <div id="ouch-overlay">
      <div class="ouch-bg"></div>
      <span class="ouch-text">Ouch!</span>
    </div>

    <!-- TITLE SCREEN -->
    <div id="title-screen">
      <img class="logo" src="assets/ShaveMyBackLogo.png" alt="Shave My Back" />
      <button id="start-btn" onclick="startGame()">
        <img
          src="assets/StartNow.png"
          alt="Start"
          style="width: 100%; display: block"
        />
      </button>
    </div>

    <!-- SKIN SELECTOR (title) -->
    <div class="skin-selector" id="title-skin-selector">
      <button class="skin-btn" onclick="selectSkin('Skin')" id="ts-skin">
        <img
          src="assets/SkinActive.png"
          alt="Skin"
          style="width: 100%; display: block"
        />
      </button>
      <button class="skin-btn" onclick="selectSkin('TattooBG')" id="ts-tattoo">
        <img
          src="assets/Tattooed.png"
          alt="Tattooed"
          style="width: 100%; display: block"
        />
      </button>
      <button class="skin-btn" onclick="selectSkin('GreenBG')" id="ts-green">
        <img
          src="assets/Green.png"
          alt="Green"
          style="width: 100%; display: block"
        />
      </button>
      <button class="skin-btn" onclick="selectSkin('AlienBG')" id="ts-alien">
        <img
          src="assets/Alien.png"
          alt="Alien"
          style="width: 100%; display: block"
        />
      </button>
    </div>

    <!-- GAME AREA -->
    <div id="game-container">
      <canvas id="layer1"></canvas>
      <canvas id="layer2"></canvas>
      <canvas id="layer3"></canvas>
      <canvas id="layer4"></canvas>
    </div>

    <!-- LEFT CONTROLS: undo + redo -->
    <div class="ui-container" id="left-ctrl">
      <img
        id="undoBtn"
        src="assets/undo.png"
        class="btn"
        onclick="undo()"
        alt="Undo"
      />
      <img
        id="redoBtn"
        src="assets/redo.png"
        class="btn"
        onclick="redo()"
        alt="Redo"
      />
    </div>

    <!-- RIGHT CONTROL: restart -->
    <div class="ui-container" id="right-ctrl">
      <img
        id="restartBtn"
        src="assets/restart.png"
        class="btn"
        onclick="restartGame()"
        alt="Restart"
      />
    </div>

    <!-- IN-GAME SKIN SELECTOR -->
    <div id="game-skin-selector">
      <button class="skin-btn" onclick="selectSkin('Skin')" id="gs-skin">
        <img
          src="assets/SkinActive.png"
          alt="Skin"
          style="width: 100%; display: block"
        />
      </button>
      <button class="skin-btn" onclick="selectSkin('TattooBG')" id="gs-tattoo">
        <img
          src="assets/Tattooed.png"
          alt="Tattoo"
          style="width: 100%; display: block"
        />
      </button>
      <button class="skin-btn" onclick="selectSkin('GreenBG')" id="gs-green">
        <img
          src="assets/Green.png"
          alt="Green"
          style="width: 100%; display: block"
        />
      </button>
      <button class="skin-btn" onclick="selectSkin('AlienBG')" id="gs-alien">
        <img
          src="assets/Alien.png"
          alt="Alien"
          style="width: 100%; display: block"
        />
      </button>
    </div>

    <script src="app.js"></script>
  </body>
</html>
